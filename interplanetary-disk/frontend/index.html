<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>One2lvOS Secured</title>
  <style>
    :root {
      --neon: #00ffcc;
      --bg: #0f1117;
      --panel: #1a1d26;
      --err: #ff3366;
    }
    body {
      font-family: 'Courier New', monospace;
      background: var(--bg);
      color: var(--neon);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container { width: 100%; max-width: 600px; }
    .panel {
      background: var(--panel);
      padding: 20px;
      border: 1px solid #333;
      margin-bottom: 20px;
      border-radius: 4px;
    }
    h2 { border-bottom: 1px solid #333; padding-bottom: 10px; }
    input {
      background: #000;
      border: 1px solid #444;
      color: white;
      padding: 10px;
      width: calc(100% - 22px);
      margin-bottom: 10px;
      font-family: monospace;
    }
    button {
      background: var(--neon);
      color: #000;
      border: none;
      padding: 10px 20px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      text-transform: uppercase;
    }
    button:hover { opacity: 0.9; }
    button.disabled { background: #555; cursor: not-allowed; }
    .status-bar {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 20px;
    }
    #log {
      color: #888;
      font-size: 0.9rem;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
      padding: 10px;
      background: #000;
    }
    .hidden { display: none; }
    .success { color: #00ff00; }
    .error { color: var(--err); }
    .info { color: var(--neon); }
  </style>
</head>
<body>
  <div class="container">
    <!-- HEADER -->
    <div class="status-bar">
      <span id="clock">--:--</span>
      <span>NODE 0x73 [SECURED]</span>
    </div>
    <h1>One2lvOS Control Plane</h1>

    <!-- LOGIN PANEL -->
    <div id="loginPanel" class="panel">
      <h2>// Authenticate</h2>
      <input type="text" id="u" placeholder="Username (admin)" value="admin">
      <input type="password" id="p" placeholder="Password (admin)" value="admin">
      <button onclick="login()">Access Node</button>
    </div>

    <!-- DASHBOARD PANEL (Hidden until login) -->
    <div id="dashPanel" class="panel hidden">
      <h2>// Commands</h2>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button onclick="getStatus()">Ping Status</button>
        <button onclick="deploy()" style="background: #ff9900;">Trigger Deploy</button>
      </div>
      <h3>Output Stream</h3>
      <div class="panel" style="background: #000; min-height: 100px;">
        <div id="log">System Ready...</div>
      </div>
      <button onclick="logout()" style="background: #333; color: #fff; margin-top: 10px;">Terminate Session</button>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:8080/api';
    let TOKEN = localStorage.getItem('one2lv_jwt');

    // Auto-login check
    if (TOKEN) showDash();

    // Helper to update the UI
    function showDash() {
      document.getElementById('loginPanel').classList.add('hidden');
      document.getElementById('dashPanel').classList.remove('hidden');
      log("Session Active: Admin Authenticated.", "success");
    }

    function log(msg, type='info') {
      const logDiv = document.getElementById('log');
      const timestamp = new Date().toLocaleTimeString();
      logDiv.innerText += `\n[${timestamp}] ${msg}`;
      logDiv.scrollTop = logDiv.scrollHeight;

      // Apply color class
      if (type === 'success') logDiv.style.color = '#00ff00';
      else if (type === 'error') logDiv.style.color = '#ff3366';
      else logDiv.style.color = '#00ffcc';
    }

    async function login() {
      const username = document.getElementById('u').value;
      const password = document.getElementById('p').value;

      try {
        const res = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        if (data.token) {
          localStorage.setItem('one2lv_jwt', data.token);
          TOKEN = data.token;
          showDash();
          log("Authentication successful!", "success");
        } else {
          log("Access Denied: " + (data.error || "Unknown Error"), "error");
        }
      } catch (err) {
        log("Connection Error: " + err.message, "error");
      }
    }

    async function getStatus() {
      try {
        const res = await fetch(`${API_URL}/status`);
        const data = await res.json();
        log(`Status: ${data.node} | Security: ${data.security} | Timestamp: ${data.timestamp}`, "info");
      } catch (err) {
        log("Status Check Failed: " + err.message, "error");
      }
    }

    async function deploy() {
      if (!TOKEN) {
        log("Error: Not authenticated. Please login first.", "error");
        return;
      }

      try {
        const res = await fetch(`${API_URL}/deploy`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${TOKEN}`,
            'Content-Type': 'application/json'
          }
        });

        const data = await res.json();
        if (data.success) {
          log("Deployment Initiated & Logged.", "success");
        } else {
          log("Deploy Failed: " + (data.error || "Unauthorized"), "error");
        }
      } catch (err) {
        log("Deploy Error: " + err.message, "error");
      }
    }

    function logout() {
      localStorage.removeItem('one2lv_jwt');
      TOKEN = null;
      location.reload();
    }

    // Simple Clock
    setInterval(() => {
      document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
  </script>
</body>
</html>
