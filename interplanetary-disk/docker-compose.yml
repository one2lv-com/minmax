version: '3.8'

services:
  api:
    build: ./api
    container_name: one2lvOs-api
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:-lumenis_0x73_secure_stack_dev}
    volumes:
      - ./logs:/app/logs
    restart: always
    networks:
      - one2lv-net

  sandbox:
    build: ./sandbox
    container_name: one2lvOs-sandbox
    restart: always
    networks:
      - one2lv-net

  nginx:
    image: nginx:alpine
    container_name: one2lvOs-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: always
    networks:
      - one2lv-net

networks:
  one2lv-net:
    driver: bridge