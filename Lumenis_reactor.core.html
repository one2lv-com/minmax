<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumenis Reactor Core</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050508;
color:#00ffcc;
font-family:Courier New,monospace;
overflow:hidden;
}

#galaxy{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

#ui{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:10;
pointer-events:none;
}

.panel{
position:absolute;
background:rgba(0,0,0,0.75);
border:1px solid #00ffcc;
padding:10px;
font-size:12px;
pointer-events:auto;
}

#status{
top:20px;
left:20px;
width:220px;
}

#reactorLog{
bottom:20px;
left:20px;
width:350px;
height:180px;
overflow:auto;
}

#terminal{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:600px;
height:350px;
background:black;
border:1px solid #00ffcc;
display:flex;
flex-direction:column;
}

#terminalBody{
flex:1;
overflow:auto;
padding:10px;
font-size:12px;
}

#terminalInput{
border:none;
background:black;
color:#00ffcc;
padding:10px;
outline:none;
font-family:inherit;
}

.node{
position:absolute;
width:100px;
height:100px;
border-radius:50%;
border:1px solid #00ffcc;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
background:rgba(0,255,204,0.05);
}

.node:hover{
box-shadow:0 0 20px #00ffcc;
}

#nodeReactor{top:30%;left:50%;transform:translateX(-50%)}
#nodeTerminal{top:55%;left:50%;transform:translateX(-50%)}

</style>
</head>


<body>

<canvas id="galaxy"></canvas>

<div id="ui">

<div id="status" class="panel">
SYSTEM STATUS<br>
Node: Lumenis<br>
Reactor: ONLINE<br>
</div>

<div id="reactorLog" class="panel"></div>

<div id="terminal">

<div id="terminalBody">
Lumenis reactor interface ready...
</div>

<input id="terminalInput" placeholder="enter command">

</div>

<div class="node" id="nodeReactor">Reactor</div>
<div class="node" id="nodeTerminal">Terminal</div>

</div>


<script>

/* ===============================
REACTOR CORE
================================ */

class ReactorCore{

constructor(){
this.modules={}
this.log=[]
}

register(name,module){
this.modules[name]=module
}

emit(event,data){

let entry={
event:event,
time:Date.now(),
data:data
}

this.log.push(entry)

updateLog(event)

for(let m in this.modules){
let mod=this.modules[m]
if(mod.onEvent){
mod.onEvent(event,data)
}
}

}

}

window.reactor=new ReactorCore()


/* ===============================
LOG VIEW
================================ */

function updateLog(event){

let log=document.getElementById("reactorLog")

let line=document.createElement("div")
line.innerText="Reactor Event: "+event

log.appendChild(line)

log.scrollTop=log.scrollHeight

}


/* ===============================
TERMINAL
================================ */

const terminalInput=document.getElementById("terminalInput")
const terminalBody=document.getElementById("terminalBody")

terminalInput.addEventListener("keydown",e=>{

if(e.key==="Enter"){

let cmd=terminalInput.value
terminalInput.value=""

print("> "+cmd)

runCommand(cmd)

}

})

function print(text){

let line=document.createElement("div")
line.innerText=text
terminalBody.appendChild(line)

terminalBody.scrollTop=terminalBody.scrollHeight

}

function runCommand(cmd){

cmd=cmd.toLowerCase()

if(cmd==="status"){

print("Reactor online")

}

else if(cmd==="nodes"){

print(Object.keys(reactor.modules).join(","))

}

else if(cmd==="emit"){

reactor.emit("manual_event",{})

}

else{

print("unknown command")

}

}


/* ===============================
GALAXY
================================ */

let scene,camera,renderer,stars=[]

function initGalaxy(){

const canvas=document.getElementById("galaxy")

scene=new THREE.Scene()

camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z=40

renderer=new THREE.WebGLRenderer({
canvas:canvas
})

renderer.setSize(window.innerWidth,window.innerHeight)

for(let i=0;i<2000;i++){

let g=new THREE.SphereGeometry(0.05,8,8)

let m=new THREE.MeshBasicMaterial({
color:0x00ffcc
})

let star=new THREE.Mesh(g,m)

star.position.x=(Math.random()-0.5)*200
star.position.y=(Math.random()-0.5)*200
star.position.z=(Math.random()-0.5)*200

scene.add(star)
stars.push(star)

}

animateGalaxy()

}

function animateGalaxy(){

requestAnimationFrame(animateGalaxy)

stars.forEach(s=>{
s.rotation.y+=0.01
})

renderer.render(scene,camera)

}


/* ===============================
SIMULATED HEARTBEAT
================================ */

setInterval(()=>{
reactor.emit("heartbeat",{})
},2000)



/* ===============================
NODE INTERACTION
================================ */

document.getElementById("nodeReactor")
.onclick=()=>reactor.emit("reactor_node_click",{})

document.getElementById("nodeTerminal")
.onclick=()=>print("terminal activated")



/* ===============================
START
================================ */

initGalaxy()

</script>

</body>
</html>
