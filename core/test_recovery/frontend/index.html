<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>one2lvos_v4</title><link rel="stylesheet" href="/styles.css" /></head>
<body>
<header class="topbar"><div><h1>🌌🧲 one2lvos_v4</h1><div class="muted">Atomic Boot • Recovery Wizard • Offline Docs • Action Queue • AI Mesh</div></div><div class="statusbar"><span class="chip" id="healthChip">checking…</span><span class="chip" id="bootChip">booting…</span><span class="chip" id="authChip">guest</span><span class="chip" id="clockChip">—</span></div></header>
<main class="layout">
<section class="panel hero-panel"><div class="panel-title">Boot Console</div><div id="bootConsole" class="boot-console"></div><div class="button-row"><button id="bootStatusBtn" class="btn primary">Boot Status</button><button id="quickstartBtn" class="btn">Quickstart</button><button id="recoveryBtn" class="btn">Recovery</button></div></section>
<section class="panel"><div class="panel-title">Terminal</div><div id="term" class="term"></div><div class="term-foot"><span class="prompt">~ #</span><input id="cmd" class="cmd" placeholder="help | login | task run boot.status" /><button id="runBtn" class="btn primary">Run</button></div></section>
<section class="panel"><div class="panel-title">AI Mesh</div><textarea id="aiPrompt" class="ai-input" placeholder="Ask what this system is, what broke, or what approved recovery step should happen next."></textarea><div class="button-row"><button id="askAiBtn" class="btn primary">Ask AI</button><button id="streamAiBtn" class="btn">Stream AI</button><button id="policyBtn" class="btn">Policy</button></div><pre id="aiOut" class="output"></pre></section>
<section class="panel"><div class="panel-title">Admin Session</div><div class="auth-grid"><input id="userInput" class="cmd" placeholder="username" value="admin" /><input id="passInput" class="cmd" placeholder="password" type="password" /></div><div class="button-row"><button id="loginBtn" class="btn primary">Login</button><button id="jobsBtn" class="btn">Jobs</button><button id="docsBtn" class="btn">Docs</button></div><pre id="sessionOut" class="output short"></pre></section>
<section class="panel"><div class="panel-title">Workspace + Snapshots</div><input id="pathInput" class="cmd" placeholder="notes.txt" value="notes.txt" /><textarea id="editorArea" class="ai-input" placeholder="Workspace file content"></textarea><div class="button-row"><button id="loadFileBtn" class="btn">Load</button><button id="saveFileBtn" class="btn primary">Save</button><button id="snapshotBtn" class="btn">Snapshot</button></div><div class="button-row"><input id="restoreInput" class="cmd" placeholder="snapshot id to restore" /><button id="restoreBtn" class="btn">Restore</button></div></section>
<section class="panel"><div class="panel-title">Media + Feed</div><div class="media-grid"><iframe title="YouTube" src="https://www.youtube.com/embed/live_stream?channel=UC_x5XG1OV2P6uZZ5FSM9Ttw" allowfullscreen></iframe><iframe title="Twitch" src="https://player.twitch.tv/?channel=monstercat&parent=localhost" allowfullscreen></iframe><iframe title="Steam Community" src="https://steamcommunity.com/id/valve/allcomments/"></iframe><iframe title="YouTube Chat" src="https://www.youtube.com/live_chat?v=jfKfPfyJRdk&embed_domain=localhost"></iframe></div><div class="muted small">Replace placeholders with your real channels and deployed domain before production.</div></section>
<section class="panel"><div class="panel-title">Quick Actions</div><div class="button-grid"><button class="btn" data-cmd="task list">task list</button><button class="btn" data-cmd="task run boot.status">boot status</button><button class="btn" data-cmd="task run docs.list">docs list</button><button class="btn" data-cmd="task run docs.read operator_quickstart.md">read quickstart</button><button class="btn" data-cmd="task run workspace.list">workspace list</button><button class="btn" data-cmd="task run package.install docs">install docs</button><button class="btn" data-cmd="task run package.update backend">update backend</button><button class="btn" data-cmd="task run service.restart api">restart api</button></div></section>
</main><script type="module" src="/app.js"></script></body></html>
